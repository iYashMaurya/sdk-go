name: Release

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.21', '1.22']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Download dependencies
      run: go mod tidy

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: make build

    - name: Vet
      run: make vet

    - name: Unit tests with coverage
      run: go test ./tests/... -run "^Test[^R]" -v -count=1 -timeout 60s -coverprofile=coverage.out

    - name: Upload coverage
      if: matrix.go-version == '1.22'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
        fail_ci_if_error: false

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Download dependencies
      run: go mod tidy

    - name: Verify dependencies
      run: go mod verify

    - name: Integration tests
      env:
        LINGODOTDEV_API_KEY: ${{ secrets.LINGODOTDEV_API_KEY }}
      run: make test-integration

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, integration]
    if: always() && needs.test.result == 'success' && (needs.integration.result == 'success' || needs.integration.result == 'skipped')
    concurrency: release
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Install git-chglog
      run: go install github.com/git-chglog/git-chglog/cmd/git-chglog@latest

    - name: Check for version tag
      id: check_tag
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        COMMITS_SINCE=$(git rev-list ${LATEST_TAG}..HEAD --count 2>/dev/null || echo "0")
        if [ "$COMMITS_SINCE" -gt "0" ]; then
          echo "release_needed=true" >> $GITHUB_OUTPUT
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Release needed: $COMMITS_SINCE commits since $LATEST_TAG"
        else
          echo "release_needed=false" >> $GITHUB_OUTPUT
          echo "No new commits since $LATEST_TAG"
        fi

    - name: Determine next version
      if: steps.check_tag.outputs.release_needed == 'true'
      id: next_version
      run: |
        LATEST_TAG=${{ steps.check_tag.outputs.latest_tag }}
        VERSION=${LATEST_TAG#v}
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

        if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
          MAJOR=$((MAJOR + 1))
          MINOR=0
          PATCH=0
        elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
          MINOR=$((MINOR + 1))
          PATCH=0
        else
          PATCH=$((PATCH + 1))
        fi

        NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
        echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
        echo "Next version: $NEXT_VERSION"

    - name: Generate changelog
      if: steps.check_tag.outputs.release_needed == 'true'
      run: |
        git-chglog --next-tag ${{ steps.next_version.outputs.version }} -o CHANGELOG.md

    - name: Commit changelog
      if: steps.check_tag.outputs.release_needed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "chore: update CHANGELOG for ${{ steps.next_version.outputs.version }}" || echo "No changes to commit"
        git push

    - name: Create GitHub release
      if: steps.check_tag.outputs.release_needed == 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=${{ steps.next_version.outputs.version }}
        git tag "$VERSION"
        git push origin "$VERSION"

        NOTES=$(git-chglog --next-tag "$VERSION" "$VERSION")

        gh release create "$VERSION" \
          --title "$VERSION" \
          --notes "$NOTES" \
          --latest
